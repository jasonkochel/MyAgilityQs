<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- iOS Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="MyAgilityQs">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    
    <!-- Android Chrome -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#228be6">
    
    <title>MyAgilityQs - Dog Agility Training Tracker</title>
  </head>
  <body>
    <style>
      #boot-splash {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }
      #boot-splash > div {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }
      #boot-splash svg { color: #228be6; }
      #boot-splash .brand {
        font-weight: 700;
        font-size: 1.25rem;
        color: #228be6;
      }
      #boot-splash .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid #e7f5ff;
        border-top-color: #228be6;
        border-radius: 50%;
        animation: boot-spin 0.8s linear infinite;
      }
      @keyframes boot-spin { to { transform: rotate(360deg); } }
    </style>
    <div id="root">
      <div id="boot-splash">
        <div>
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M11 5h2"/>
            <path d="M19 12c-.667 5.333 -2.333 8 -5 8h-4c-2.667 0 -4.333 -2.667 -5 -8"/>
            <path d="M11 16c0 .667 .333 1 1 1s1 -.333 1 -1h-2"/>
            <path d="M12 18v2"/>
            <path d="M10 11v.01"/>
            <path d="M14 11v.01"/>
            <path d="M5 4l6 .97l-6.238 6.688a1.021 1.021 0 0 1 -1.41 .111a.953 .953 0 0 1 -.327 -.954l1.975 -6.815"/>
            <path d="M19 4l-6 .97l6.238 6.688c.358 .408 .989 .458 1.41 .111a.953 .953 0 0 0 .327 -.954l-1.975 -6.815"/>
          </svg>
          <div class="brand">MyAgilityQs</div>
          <div class="spinner" role="status" aria-label="Loading"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
